name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg
            ${{ github.workspace }}\build\vs2022\windows-debug\vcpkg_installed
          key: windows-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path C:\vcpkg\.git)) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          }
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-debug

      - name: Build
        shell: pwsh
        run: cmake --build --preset build-debug

      - name: Test
        shell: pwsh
        run: ctest --preset test-debug
