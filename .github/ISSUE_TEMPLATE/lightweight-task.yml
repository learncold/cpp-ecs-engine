name: Lightweight Task
description: Optionally record small Docs, Chore, or Analysis work.
body:
  - type: markdown
    attributes:
      value: |
        Use this form only when an optional tracking issue is useful.

        Documentation, maintenance, and analysis work can start without creating or linking an issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the task in one short paragraph.
      placeholder: Add a short guide for how the team should use the GitHub Project board.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the main area this task belongs to.
      options:
        - Docs
        - Chore
        - Analysis
    validations:
      required: true
  - type: dropdown
    id: sprint
    attributes:
      label: Target Sprint
      description: Choose the sprint that should own this task.
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Later
    validations:
      required: true
  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: State what concrete output or change should exist when the task is done.
      placeholder: |
        - Add `docs/process/GitHub Project.md`
        - Capture the expected team workflow
    validations:
      required: true
  - type: textarea
    id: done-when
    attributes:
      label: Done When
      description: List the simplest completion criteria for this task.
      placeholder: |
        - The document or maintenance change is merged
        - The intended audience can use the result without extra clarification
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification / Notes
      description: Record how the task should be checked, or explain why no build/test validation is needed.
      placeholder: |
        - Review the markdown in GitHub
        - Docs-only change; no build/test run required
